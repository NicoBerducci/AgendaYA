name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agenda_ya/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: agenda_ya

      - name: Run tests
        run: npm test
        working-directory: agenda_ya

      - name: Build project
        run: npm run build
        working-directory: agenda_ya 
